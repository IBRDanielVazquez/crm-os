version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-os-db
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_password_2026
      POSTGRES_DB: crm_os_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
